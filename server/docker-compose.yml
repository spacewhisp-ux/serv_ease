services:
  postgres:
    image: postgres:16-alpine
    container_name: serv-ease-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: serv_ease
    volumes:
      - serv_ease_postgres_data:/var/lib/postgresql/data

volumes:
  serv_ease_postgres_data:
